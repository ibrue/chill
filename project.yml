name: Chill
options:
  bundleIdPrefix: com.chill
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

schemes:
  Chill:
    build:
      targets:
        Chill: all
  ChillHelper:
    build:
      targets:
        ChillHelper: all

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  Chill:
    type: application
    platform: macOS
    sources:
      - path: Chill
        excludes:
          - "**/*.swiftui"
          - "Core/SMC/**"   # SMC files live in Shared/ — included below
      - path: Shared
    resources:
      - path: Chill/Assets.xcassets
      - path: Config/Chill.entitlements
        buildPhase: sources
    dependencies:
      - target: ChillHelper
        embed: false
      - package: Sparkle
        product: Sparkle
    settings:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      SWIFT_VERSION: "5.9"
      SWIFT_EXPERIMENTAL_FEATURE_OBSERVATION: true
      CODE_SIGN_ENTITLEMENTS: Config/Chill.entitlements
      INFOPLIST_KEY_LSUIElement: true
      INFOPLIST_KEY_NSPrincipalClass: NSApplication
      PRODUCT_BUNDLE_IDENTIFIER: com.chill.app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Chill/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        LSUIElement: true
        NSHumanReadableCopyright: Copyright 2025. All rights reserved.
        NSPrincipalClass: NSApplication
        NSRequiresIPhoneOS: false
        SUFeedURL: https://github.com/ibrue/chill/releases/latest/download/appcast.xml
        SUPublicEDKey: "qZasLBfbPgbFpbGuktB0Hj5Hm+I2BgHPq4V1ouDbqRs="
        SUEnableInstallerLauncherService: true

  ChillHelper:
    type: tool
    platform: macOS
    sources:
      - path: ChillHelper
      - path: Shared
    settings:
      MACOSX_DEPLOYMENT_TARGET: "14.0"
      SWIFT_VERSION: "5.9"
      CODE_SIGN_ENTITLEMENTS: Config/ChillHelper.entitlements
      PRODUCT_BUNDLE_IDENTIFIER: com.chill.helper
      PRODUCT_NAME: com.chill.helper
    info:
      path: ChillHelper/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundlePackageType: TOOL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: Copyright 2025. All rights reserved.
        NSRequiresIPhoneOS: false
